<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Bingo Musical</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <script>
    // Spotify's current /items response uses `item`, while the application
    // still consumes the legacy playlist-track shape returned by /tracks.
    // Rewrite only this endpoint until the typed client is migrated.
    const nativeFetch = window.fetch.bind(window);
    window.fetch = (input, init) => {
      if (typeof input === 'string' && input.includes('api.spotify.com/v1/playlists/') && input.includes('/items')) {
        input = input.replace('/items', '/tracks');
      }
      return nativeFetch(input, init);
    };
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
