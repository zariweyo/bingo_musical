<ion-app>
  <ion-content [fullscreen]="true">
    <main class="landing">
      <section class="hero">
        <div class="brand-mark" aria-hidden="true">
          <ion-icon name="musical-notes"></ion-icon>
        </div>

        <ion-text>
          <p class="eyebrow">Primera versión</p>
          <h1>Hola, Bingo Musical</h1>
          <p class="subtitle">
            Convierte una playlist de Spotify en una partida de bingo para jugar desde el móvil.
          </p>
        </ion-text>

        <ion-button shape="round" size="large" disabled="true">
          <ion-icon slot="start" name="play-circle"></ion-icon>
          Crear partida próximamente
        </ion-button>

        <p class="status">Ionic funcionando · Spotify será el siguiente paso</p>
      </section>
    </main>
  </ion-content>
</ion-app>
